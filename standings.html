<script>
// ─── Config ────────────────────────────────────────────────────────────────
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-5XOSNW5OzQFbezL3SOhS_iSl9_-aZWTv9QR3V60v4XcQfjX_BztLXqJz_696lGHY/exec';

var GROUP_ORDER = ['A','B','C','D','E','F','G','H','I','J','K','L'];
var TEAMS_BY_GROUP = {
  A: ['Mexico','South Korea','South Africa','Czechia'],
  B: ['Canada','Switzerland','Qatar','Bosnia & Herzegovina'],
  C: ['Brazil','Morocco','Scotland','Haiti'],
  D: ['USA','Paraguay','Australia','Türkiye'],
  E: ['Germany','Curaçao','Ivory Coast','Ecuador'],
  F: ['Netherlands','Japan','Sweden','Tunisia'],
  G: ['Belgium','Egypt','Iran','New Zealand'],
  H: ['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I: ['France','Senegal','Iraq','Norway'],
  J: ['Argentina','Algeria','Austria','Jordan'],
  K: ['Portugal','DR Congo','Uzbekistan','Colombia'],
  L: ['England','Croatia','Ghana','Panama']
};
var TEAM_TO_GROUP = null;
function getTeamGroup(team) {
  if (!TEAM_TO_GROUP) {
    TEAM_TO_GROUP = {};
    GROUP_ORDER.forEach(function(g) {
      TEAMS_BY_GROUP[g].forEach(function(t) { TEAM_TO_GROUP[t] = g; });
    });
  }
  return TEAM_TO_GROUP[team] || '';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ─── State ─────────────────────────────────────────────────────────────────
var standings = null; // { players, actuals, updated }

// ─── Load ──────────────────────────────────────────────────────────────────
function loadStandings() {
  document.getElementById('error-state').classList.add('hidden');

  var btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  var url = SCRIPT_URL + '?route=standings&t=' + Date.now();
  fetch(url, { method: 'GET', cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || data.ok === false) {
        throw new Error((data && data.error) || 'Unknown error');
      }
      standings = data;
      render();
    })
    .catch(function(err) {
      document.getElementById('error-message').textContent = String(err && err.message || err);
      document.getElementById('error-state').classList.remove('hidden');
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Refresh';
    });
}

// ─── Render ────────────────────────────────────────────────────────────────
function render() {
  renderRoundStatus();
  renderUpdated();
  renderPodium();
  renderLeaderboard();
}

function currentRoundLabel() {
  var a = standings.actuals;
  if (a.winner) return 'Champion crowned';
  if (a.final.length > 0) return 'Final';
  if (a.sf.length > 0) return 'Semifinals';
  if (a.qf.length > 0) return 'Quarterfinals';
  if (a.r16.length > 0) return 'Round of 16';
  if (a.r32.length > 0) return 'Round of 32';
  return 'Awaiting kickoff';
}

function renderRoundStatus() {
  var label = currentRoundLabel();
  var pill = document.getElementById('round-status');
  var text = document.getElementById('round-status-text');
  text.textContent = label;
  if (label === 'Awaiting kickoff') {
    pill.classList.add('idle');
  } else {
    pill.classList.remove('idle');
  }
}

function renderUpdated() {
  var el = document.getElementById('updated-text');
  if (!standings.updated) {
    // No actuals entered yet — nothing meaningful to show
    el.textContent = '';
    return;
  }
  el.textContent = 'Last result entered ' + formatRelativeTime(standings.updated);
}

function formatRelativeTime(iso) {
  var then = new Date(iso);
  var now = new Date();
  var seconds = Math.max(0, Math.round((now - then) / 1000));

  if (seconds < 45) return 'just now';
  if (seconds < 90) return '1 minute ago';

  var minutes = Math.round(seconds / 60);
  if (minutes < 60) return minutes + ' minutes ago';

  var hours = Math.round(minutes / 60);
  if (hours < 24) return hours + (hours === 1 ? ' hour ago' : ' hours ago');

  var days = Math.round(hours / 24);
  if (days < 7) return days + (days === 1 ? ' day ago' : ' days ago');

  // Fall back to an absolute date for older edits
  var hh = then.getHours();
  var mm = then.getMinutes();
  var ampm = hh >= 12 ? 'PM' : 'AM';
  var hh12 = ((hh + 11) % 12) + 1;
  var mmStr = mm < 10 ? ('0' + mm) : mm;
  var date = then.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  return 'on ' + date + ' at ' + hh12 + ':' + mmStr + ' ' + ampm;
}

function renderPodium() {
  var host = document.getElementById('podium');
  var labels = ['Champion', 'Runner-up', 'Third', 'In the money'];
  var classes = ['podium-1','podium-2','podium-3','podium-4'];
  var ranks = ['1st', '2nd', '3rd', '4th'];

  var html = '';
  for (var i = 0; i < 4; i++) {
    var p = standings.players[i];
    if (!p) {
      html += '<div class="podium-card podium-' + (i+1) + ' empty">' +
                '<div class="flex items-baseline justify-between">' +
                  '<div class="podium-rank">' + ranks[i] + '</div>' +
                  '<div class="podium-label">' + labels[i] + '</div>' +
                '</div>' +
                '<div class="podium-name text-chalk-mute italic">Awaiting picks</div>' +
                '<div class="podium-pts">—</div>' +
                '<div class="podium-pts-sub">No score yet</div>' +
              '</div>';
      continue;
    }
    html += '<div class="podium-card ' + classes[i] + '">' +
              '<div class="flex items-baseline justify-between">' +
                '<div class="podium-rank">' + ranks[i] + '</div>' +
                '<div class="podium-label">' + labels[i] + '</div>' +
              '</div>' +
              '<div class="podium-name">' + escapeHtml(p.name) + '</div>' +
              '<div class="podium-pts">' + p.total + '</div>' +
              '<div class="podium-pts-sub">' + (p.total === 1 ? 'point' : 'points') + ' · max 192</div>' +
            '</div>';
  }
  host.innerHTML = html;
}

function renderLeaderboard() {
  var host = document.getElementById('leaderboard');
  if (!standings.players.length) {
    host.innerHTML =
      '<div class="card p-5 text-center text-chalk-mute italic">' +
        'No picks submitted yet. Check back soon.' +
      '</div>';
    return;
  }

  var html = '';
  // Compute display rank with ties: same total → same rank.
  var lastTotal = null;
  var lastDisplayRank = 0;
  for (var i = 0; i < standings.players.length; i++) {
    var p = standings.players[i];
    var displayRank;
    if (p.total === lastTotal) {
      displayRank = lastDisplayRank;
    } else {
      displayRank = i + 1;
      lastDisplayRank = displayRank;
      lastTotal = p.total;
    }

    var topClass = displayRank <= 4 ? ' top-' + displayRank : '';
    var champClass = '';
    if (standings.actuals.winner && p.picks.winner) {
      champClass = (p.picks.winner === standings.actuals.winner) ? ' champ-correct' : ' champ-wrong';
    }

    var champTeam = p.picks.winner ? escapeHtml(p.picks.winner) : '—';
    var champLine =
      '<div class="lb-champ-pick">' +
        '<span class="label">Pick to win:</span> ' +
        '<span class="team">' + champTeam + '</span>' +
      '</div>';

    html += '<details class="lb-row' + topClass + champClass + '">' +
              '<summary>' +
                '<div class="lb-rank">' + displayRank + '</div>' +
                '<div class="lb-name-block">' +
                  '<div class="lb-name">' + escapeHtml(p.name) + '</div>' +
                  champLine +
                '</div>' +
                '<div class="lb-pts">' + p.total +
                  ' <span class="lb-pts-sub">PTS</span>' +
                '</div>' +
                '<div class="lb-caret">▾</div>' +
              '</summary>' +
              '<div class="lb-body">' + renderPicksBody(p) + '</div>' +
            '</details>';
  }
  host.innerHTML = html;
}

// ─── Picks body (condensed multi-column) ───────────────────────────────────
function renderPicksBody(player) {
  var pi = player.picks;
  var act = standings.actuals;

  var r32Set = new Set(act.r32);
  var r16Set = new Set(act.r16);
  var qfSet  = new Set(act.qf);
  var sfSet  = new Set(act.sf);
  var fSet   = new Set(act.final);

  // A round is treated as "scored" only when its actuals are fully entered.
  // This avoids flashing false eliminations while Sean enters advancers one
  // at a time after a round wraps.
  var r32Scored = act.r32.length >= 32;
  var r16Scored = act.r16.length >= 16;
  var qfScored  = act.qf.length  >= 8;
  var sfScored  = act.sf.length  >= 4;
  var fScored   = act.final.length >= 2;

  // R32: 12 group cards
  var r32Html = '<div class="picks-grid-r32">';
  GROUP_ORDER.forEach(function(g) {
    var top2 = (pi.groups && pi.groups[g]) || ['',''];
    var wcs = (pi.wildcards || []).filter(function(t) { return t && getTeamGroup(t) === g; });
    r32Html += '<div class="pick-card">' +
                 '<div class="pick-card-head">' +
                   '<div class="pick-card-title">Group ' + g + '</div>' +
                   '<div class="pick-card-pts">1 PT</div>' +
                 '</div>';
    top2.forEach(function(t) {
      r32Html += pickRow(t, r32Set, r32Scored, 'TOP 2', 'pick-tag-top2');
    });
    wcs.forEach(function(t) {
      r32Html += pickRow(t, r32Set, r32Scored, 'WC', 'pick-tag-wc');
    });
    r32Html += '</div>';
  });
  r32Html += '</div>';

  // KO: 4 columns
  var koHtml = '<div class="mt-3 picks-grid-ko">' +
    pickKoCard('Round of 16', '2 PTS', pi.r16, r16Set, r16Scored) +
    pickKoCard('Quarterfinals', '4 PTS', pi.qf, qfSet, qfScored) +
    pickKoCard('Semifinals', '8 PTS', pi.sf, sfSet, sfScored) +
    pickKoCard('Finals', '16 PTS', pi.final, fSet, fScored) +
  '</div>';

  // Champion + tiebreak
  var winnerCorrect = pi.winner && act.winner && pi.winner === act.winner;
  var winnerWrong = pi.winner && act.winner && pi.winner !== act.winner;
  var champClass = winnerWrong ? 'champ-strip dead' : 'champ-strip';
  var winnerDisplay = pi.winner
    ? escapeHtml(pi.winner) + (getTeamGroup(pi.winner)
        ? ' <span class="font-mono text-[11px] uppercase tracking-wider text-chalk-mute ml-1">Group ' + getTeamGroup(pi.winner) + '</span>'
        : '')
    : '<span class="text-chalk-mute italic font-sans">—</span>';
  var champLabel = winnerCorrect ? 'Champion · 32 PTS · Correct'
                  : winnerWrong   ? 'Champion · 0 PTS'
                  :                 'Champion · 32 PTS';

  var actualWinnerLine = act.winner
    ? '<div class="font-mono text-[10px] uppercase tracking-wider text-chalk-mute mt-1">Actual: ' + escapeHtml(act.winner) + '</div>'
    : '';

  var tbVal = pi.tiebreak !== '' && pi.tiebreak != null ? pi.tiebreak : '—';
  var tbActual = act.tiebreak !== '' && act.tiebreak != null
    ? ' <span class="text-chalk-mute"> · actual ' + escapeHtml(act.tiebreak) + '</span>'
    : '';

  var champHtml = '<div class="' + champClass + '">' +
    '<div class="champ-block">' +
      '<div>' +
        '<div class="champ-label">' + champLabel + '</div>' +
        '<div class="champ-team">' + winnerDisplay + '</div>' +
        actualWinnerLine +
      '</div>' +
    '</div>' +
    '<div class="tb-block">' +
      '<span class="tb-label">Tiebreaker</span>' +
      '<span class="tb-val">' + escapeHtml(tbVal) + ' goals' + tbActual + '</span>' +
    '</div>' +
  '</div>';

  return r32Html + koHtml + champHtml;
}

function pickRow(team, actualSet, hasActuals, tag, tagClass) {
  if (!team) {
    return '<div class="pick-row pending">' +
      '<span class="pick-name text-chalk-mute italic">—</span>' +
      '<span class="pick-tag ' + tagClass + '">' + tag + '</span>' +
    '</div>';
  }
  var status;
  if (!hasActuals) status = 'pending';
  else status = actualSet.has(team) ? 'alive' : 'dead';
  return '<div class="pick-row ' + status + '">' +
    '<span class="pick-name">' + escapeHtml(team) + '</span>' +
    '<span class="pick-tag ' + tagClass + '">' + tag + '</span>' +
  '</div>';
}

function pickKoCard(title, pts, teams, actualSet, hasActuals) {
  var rows = '';
  if (!teams || teams.length === 0) {
    rows = '<div class="pick-row pending"><span class="pick-name text-chalk-mute italic">No picks</span></div>';
  } else {
    teams.forEach(function(t) {
      if (!t) {
        rows += '<div class="pick-row pending"><span class="pick-name text-chalk-mute italic">—</span></div>';
        return;
      }
      var g = getTeamGroup(t);
      var status = !hasActuals ? 'pending' : (actualSet.has(t) ? 'alive' : 'dead');
      rows += '<div class="pick-row ' + status + '">' +
        '<span class="pick-name">' + escapeHtml(t) + '</span>' +
        (g ? '<span class="pick-tag pick-tag-top2">' + g + '</span>' : '') +
      '</div>';
    });
  }
  return '<div class="pick-card">' +
    '<div class="pick-card-head">' +
      '<div class="pick-card-title">' + title + '</div>' +
      '<div class="pick-card-pts">' + pts + '</div>' +
    '</div>' +
    rows +
  '</div>';
}

// ─── Wire up ──────────────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', loadStandings);
loadStandings();
</script>
