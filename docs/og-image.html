<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BR Pool 2026 · OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Outline&family=Google+Sans+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0e17;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    color: #f4f6fb;
  }
  .frame {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background-color: #0a0e17;
    background-image:
      radial-gradient(circle at 18% 0%, rgba(34,255,136,0.16), transparent 55%),
      radial-gradient(circle at 92% 100%, rgba(255,181,71,0.10), transparent 50%),
      linear-gradient(rgba(255,255,255,0.030) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.030) 1px, transparent 1px);
    background-size: auto, auto, 64px 64px, 64px 64px;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    padding: 56px 72px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    row-gap: 0;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .middle {
    display: flex;
    align-items: center;
  }
  h1 {
    font-family: "Bungee Outline", Impact, sans-serif;
    text-transform: uppercase;
    font-size: 124px;
    line-height: 0.98;
    letter-spacing: -0.01em;
    margin: 0;
    color: #f4f6fb;
  }
  h1 .turf { color: #22ff88; }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-family: "Google Sans Code", "JetBrains Mono", ui-monospace, monospace;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8b94ad;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 40px;
    height: 1px;
    background: rgba(139, 148, 173, 0.5);
  }
  .badge {
    font-family: "Google Sans Code", "JetBrains Mono", ui-monospace, monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #22ff88;
    background: rgba(34, 255, 136, 0.10);
    border: 1px solid rgba(34, 255, 136, 0.40);
    border-radius: 6px;
    padding: 8px 14px;
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 22px;
    font-family: "Google Sans Code", "JetBrains Mono", ui-monospace, monospace;
    font-weight: 700;
    font-size: 24px;
    line-height: 1;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c8cfdd;
  }
  .meta .sep {
    color: #3a4260;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top">
    <div class="eyebrow">Bouman · Romoser</div>
    <div class="badge">Pool 2026</div>
  </div>

  <div class="middle">
    <h1>World Cup<br/><span class="turf">Pool '26</span></h1>
  </div>

  <div class="meta">
    <span>11 Jun → 19 Jul 2026</span>
    <span class="sep">/</span>
    <span>USA · CAN · MEX</span>
  </div>
</div>
</body>
</html>
